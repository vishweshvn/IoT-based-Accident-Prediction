<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accident Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚦 Intelligent Accident Monitoring Dashboard</h1>
<p class="subtitle">For Emergency Services & City Authorities</p>

<div class="card">
    <h2>Accident Status</h2>
    <p id="status">Loading...</p>
</div>

<div class="card">
    <h2>Sensor Data</h2>
    <p>Acceleration (g): <span id="accel">--</span></p>
    <p>Gyroscope: <span id="gyro">--</span></p>
</div>

<div class="card">
    <h2>Accident Location</h2>
    <p>Latitude: <span id="lat">--</span></p>
    <p>Longitude: <span id="lon">--</span></p>
</div>

<div class="card">
    <h2>AI-Based Accident Video</h2>
    <iframe width="520" height="300"
src="https://youtu.be/-emcafggs_U?si=fodzYy1t1KqnukAS"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<script src="script.js"></script>

</body>
</html>
